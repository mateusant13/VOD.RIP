name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio
          npm ci
      - name: Type-check frontend
        run: npx tsc --noEmit
      - name: Python syntax check
        run: python -m compileall -q backend
      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  build:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
          - os: macos-latest
            label: macOS-arm64
          - os: ubuntu-22.04
            label: Linux-x64

    env:
      # Empty default; real values come from repository secrets when set.
      VODRIP_CERT_B64: ""
      VODRIP_CERT_PWD: ""
      VODRIP_TIMESTAMP: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libwebkit2gtk-4.1-0 \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            python3-gi python3-gi-cairo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller pywebview pystray Pillow

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build-copy

      - name: Sync app icons
        run: python scripts/generate-icon.py

      - name: Generate macOS icns
        if: runner.os == 'macOS'
        run: bash scripts/generate-icns.sh

      - name: Download ffmpeg (optional)
        shell: bash
        run: bash scripts/download-ffmpeg.sh || true

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller vod-rip.spec --clean --noconfirm

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Remove-Item -Recurse -Force installer\staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path installer\staging | Out-Null
          Copy-Item -Path dist\VOD-RIP\* -Destination installer\staging -Recurse -Force
          Write-Host "Downloading WebView2 bootstrapper for installer..."
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "installer\MicrosoftEdgeWebview2Setup.exe"
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver installer\installer.iss

      # F4/F13 (ANTIVIRUS_AUDIT): sign the PyInstaller bootloader and the Inno
      # Setup installer with an Authenticode cert if one is provided as a
      # base64-encoded GitHub secret. Without the secret, the step is a no-op
      # and the build proceeds unsigned (as before). See docs/SIGNING.md.
      - name: Sign artefacts (Authenticode)
        if: runner.os == 'Windows' && env.VODRIP_CERT_B64 != ''
        shell: pwsh
        env:
          VODRIP_CERT_B64: ${{ secrets.VODRIP_CERT_B64 }}
          VODRIP_CERT_PWD: ${{ secrets.VODRIP_CERT_PWD }}
          VODRIP_TIMESTAMP: ${{ secrets.VODRIP_TIMESTAMP }}
        run: |
          $ErrorActionPreference = 'Stop'
          $timestamp = if ($env:VODRIP_TIMESTAMP) { $env:VODRIP_TIMESTAMP } else { 'http://timestamp.digicert.com' }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'vodrip.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:VODRIP_CERT_B64))

          # Locate signtool.exe (Windows SDK).
          $signtool = (Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $signtool) {
            Write-Host "::warning::signtool.exe not found; skipping signing step"
            exit 0
          }

          # Sign the PyInstaller bootloader.
          $bootloader = "dist\VOD-RIP\VOD-RIP.exe"
          if (Test-Path $bootloader) {
            & $signtool sign /fd SHA256 /tr $timestamp /td sha256 /f $pfxPath /p $env:VODRIP_CERT_PWD $bootloader
            Write-Host "Signed bootloader: $bootloader"
          }

          # Sign the Inno Setup installer (if produced).
          $installer = Get-ChildItem -Path release -Filter "*-Setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            & $signtool sign /fd SHA256 /tr $timestamp /td sha256 /f $pfxPath /p $env:VODRIP_CERT_PWD $installer.FullName
            Write-Host "Signed installer: $($installer.FullName)"
          }

          # Clean up the cert on disk.
          Remove-Item -Force $pfxPath

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/VOD-RIP/* -DestinationPath "release/VOD.RIP-${{ github.ref_name }}-${{ matrix.label }}.zip" -Force

      # F1: publish SHA-256 sidecars so the in-app updater can verify downloads
      # before extract/execute. Checksums are computed AFTER signing on Windows.
      - name: Generate SHA-256 sidecars
        shell: bash
        run: |
          shopt -s nullglob
          for f in release/*; do
            [ -f "$f" ] || continue
            case "$f" in *.sha256) continue ;; esac
            hash=$(sha256sum "$f" | awk '{print $1}')
            echo "$hash" > "${f}.sha256"
            echo "  ${f}.sha256"
          done


      - name: Package macOS zip
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          cd dist
          zip -r "../release/VOD.RIP-${{ github.ref_name }}-${{ matrix.label }}.zip" "VOD.RIP.app"

      - name: Package Linux zip
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          cd dist/VOD-RIP
          zip -r "../../release/VOD.RIP-${{ github.ref_name }}-${{ matrix.label }}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vod-rip-${{ matrix.label }}
          path: |
            release/*.zip
            release/*.sha256
            release/*-Setup.exe
            release/*-Setup.exe.sha256
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-assets/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
