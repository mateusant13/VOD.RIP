name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          npm ci
      - name: Type-check frontend
        run: npx tsc --noEmit
      - name: Python syntax check
        run: python -m compileall -q backend

  build:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
          - os: macos-latest
            label: macOS-arm64
          - os: ubuntu-22.04
            label: Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libwebkit2gtk-4.1-0 \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            python3-gi python3-gi-cairo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller pywebview pystray Pillow

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build-copy

      - name: Sync app icons
        run: python scripts/generate-icon.py

      - name: Generate macOS icns
        if: runner.os == 'macOS'
        run: bash scripts/generate-icns.sh

      - name: Download ffmpeg (optional)
        shell: bash
        run: bash scripts/download-ffmpeg.sh || true

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller vod-rip.spec --clean --noconfirm

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/VOD-RIP/* -DestinationPath "release/VOD.RIP-${{ github.ref_name }}-${{ matrix.label }}.zip" -Force

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Remove-Item -Recurse -Force installer\staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path installer\staging | Out-Null
          Copy-Item -Path dist\VOD-RIP\* -Destination installer\staging -Recurse -Force
          Write-Host "Downloading WebView2 bootstrapper for installer..."
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "installer\MicrosoftEdgeWebview2Setup.exe"
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver installer\installer.iss

      - name: Package macOS zip
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          cd dist
          zip -r "../release/VOD.RIP-${{ github.ref_name }}-${{ matrix.label }}.zip" "VOD.RIP.app"

      - name: Package Linux zip
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          cd dist/VOD-RIP
          zip -r "../../release/VOD.RIP-${{ github.ref_name }}-${{ matrix.label }}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vod-rip-${{ matrix.label }}
          path: |
            release/*.zip
            release/*-Setup.exe
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-assets/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
