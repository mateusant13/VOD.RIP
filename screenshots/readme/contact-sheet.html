<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VOD.RIP 🪦 Screenshot Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: system-ui; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #53fc18; }
  p { color: #888; margin-bottom: 2rem; font-size: 0.875rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
  .card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
  .card img { width: 100%; height: auto; display: block; }
  .card .label { padding: 0.75rem; font-weight: 600; font-size: 0.875rem; }
</style>
</head>
<body>
<h1>VOD.RIP 🪦 — README Screenshots</h1>
<p>Review all screenshots in one place.</p>
<div class="grid">
<div class="card"><div class="label">hero.png</div><img src="hero.png" alt="hero.png" loading="lazy"></div>
<div class="card"><div class="label">channel-open.png</div><img src="channel-open.png" alt="channel-open.png" loading="lazy"></div>
<div class="card"><div class="label">preview.png</div><img src="preview.png" alt="preview.png" loading="lazy"></div>
<div class="card"><div class="label">trim.png</div><img src="trim.png" alt="trim.png" loading="lazy"></div>
<div class="card"><div class="label">queue.png</div><img src="queue.png" alt="queue.png" loading="lazy"></div>
</div>
</body>
</html>
